<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js" defer></script>
</head>

<body>
    <header>
        <a href="#">
            <div id="logo">
                <img class="inv" src="./assets/images/logo.png" alt="logo">
                <h4>RockPaperScissors</h4>
            </div>
        </a>
        <div>
            <img class="inv" id="theme-icon" src="./assets/images/theme-icon.png" alt="theme">
        </div>
    </header>
    <main>
        <article class="scoreSec">
            <section class="score">
                <p id="yourScore">0</p>
                <p>You</p>
            </section>
            <section class="score">
                <p id="drawScore">0</p>
                <p>Draw</p>
            </section>
            <section class="score">
                <p id="compScore">0</p>
                <p>Computer</p>
            </section>
        </article>

        <article class="choiceSec">
            <section class="choice" id="rock">
                <img src="./assets/images/rock.png" alt="rock">
            </section>
            <section class="choice" id="paper">
                <img src="./assets/images/paper.png" alt="paper">
            </section>
            <section class="choice" id="scissors">
                <img src="./assets/images/scissors.png" alt="scissors">
            </section>
        </article>

        <article class="msgSec">
            <section>
                <p id="msg">Play your turn...</p>
            </section>
            <section class="reset-btn-sec">
                <button class="reset-btn">Reset Game</button>
            </section>
        </article>
    </main>
    <footer>
        <span>&copy; 2026 Rock Paper Scissors by HBI </span>
        <a href="https://github.com/hassanbinilyas"><img class="inv" src="./assets/images/github-icon.png" alt="GitHub"></a>
    </footer>
</body>

</html>
